<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak 🎉</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: monospace;
  color: #00ffcc;
  text-align: center;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}

h1 {
  font-size: 50px;
  margin-top: 50px;
  letter-spacing: 5px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #00ffcc; }
  to { text-shadow: 0 0 40px #00ffcc; }
}

.names {
  font-size: 26px;
  margin-top: 20px;
  line-height: 1.6;
}

.from {
  margin-top: 10px;
  font-size: 18px;
  color: #ffffff;
  opacity: 0.8;
}

.heart {
  font-size: 90px;
  animation: beat 1s infinite;
}

@keyframes beat {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

.text {
  margin-top: 20px;
  font-size: 20px;
  width: 80%;
  margin-left: auto;
  margin-right: auto;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 16px;
  background: #00ffcc;
  border: none;
  cursor: pointer;
  border-radius: 10px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>EID MUBARAK 🎉</h1>

<div class="names">
Hasan • Ali • Haidar • Leith • Shahd<br>
Lora • Khalil • Safaa • Jafar • Malak • Souliman
</div>

<div class="from">
— From Zoalfiqar 😎🔥
</div>

<div class="heart">❤️</div>

<button onclick="playMusic()">Play Music 🎧</button>

<div class="text" id="typing"></div>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
</audio>

<script>
// stars
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";

  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

function updateStars() {
  stars.forEach(star => {
    star.y += 0.2;
    if (star.y > canvas.height) star.y = 0;
  });
}

function animate() {
  drawStars();
  updateStars();
  requestAnimationFrame(animate);
}
animate();

// music
function playMusic() {
  document.getElementById("music").play();
}

// typing
const text = `Eid Mubarak my people 🎉

Another year with the same legends...
same laughs, same chaos 😄

Honestly, life hits different with you all.

Stay real, stay crazy...
and don’t ever change ❤️`;

let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 30);
  }
}

setTimeout(typeWriter, 1000);
</script>

</body>
</html>
